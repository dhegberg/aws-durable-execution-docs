name: Closed Issue Message

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  post-message-and-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const number = context.issue.number;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: '⚠️ This issue has been closed. If you have a similar problem, please [open a new issue](../../issues/new/choose) and include relevant details so we can investigate properly.\n\nComments on closed issues are hard for our team to track. A new issue ensures you get the attention you need.'
            });

            await github.rest.issues.lock({
              owner,
              repo,
              issue_number: number,
              lock_reason: 'resolved'
            });
